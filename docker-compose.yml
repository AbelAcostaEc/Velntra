services:
  app:
    build:
      context: ./docker/php
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - velntra

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - velntra

  mysql:
    image: mysql:8.0
    ports:
      - "${FORWARD_DB_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-velntra}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-velntra}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - velntra_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - velntra

  node:
    image: node:20-alpine
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    environment:
      HOME: /tmp
    volumes:
      - ./src:/var/www/html
    command: sh
    tty: true
    networks:
      - velntra

volumes:
  velntra_mysql_data:

networks:
  velntra:
    driver: bridge
